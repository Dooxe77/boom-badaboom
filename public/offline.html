<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boom Badaboom - Mode hors ligne</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { margin-bottom: 20px; }
        .emoji { font-size: 4rem; margin-bottom: 20px; }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover { background: #b91c1c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">📱💥</div>
        <h1>Mode hors ligne</h1>
        <p>Vous êtes actuellement hors ligne, mais certaines fonctionnalités sont toujours disponibles.</p>
        <p>Reconnectez-vous à internet pour accéder à toutes les fonctionnalités.</p>
        <button onclick="window.location.reload()">Réessayer</button>
    </div>
</body>
</html>
